# Tier-2 pipeline runs against real fixtures via the LangWatch gateway.
# EXPENSIVE — burns gateway / Anthropic credits. Gated three ways so it
# never runs by accident:
#
#  1. PR label "run-tier2" — collaborator-only; the workflow only fires
#     when a write-permission user attaches the label.
#  2. Issue comment "/eval tier2" on a PR — quick repl-style trigger for
#     collaborators while reviewing. Same write-perm check.
#  3. workflow_dispatch — manual run from the Actions tab. Pre-release
#     check or ad-hoc smoke.
#
# Public-repo forks never trigger this (label / comment gates check
# repository permission level, not just who authored the comment).
name: evals · tier-2

# The pipeline doesn't write to the repo; it reads, runs claude -p, and
# logs to LangWatch. Default GHA token grants more than that — narrow it
# so a compromised dep can't push.
permissions:
  contents: read

on:
  pull_request:
    types: [labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      fixture:
        description: "Fixture name (blank = all)"
        required: false
        default: ""
      reviewer:
        description: "Reviewer skill (blank = all). e.g. review-security"
        required: false
        default: ""
      runs:
        description: "Runs per (fixture × reviewer) cell. Default 3."
        required: false
        default: "3"

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      ref: ${{ steps.gate.outputs.ref }}
      pr_number: ${{ steps.gate.outputs.pr_number }}
    steps:
      - name: Decide whether to run
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const event = context.eventName;
            const actor = context.actor;

            // For label + comment events, verify the actor has write
            // access. workflow_dispatch already enforces this.
            const hasWritePerm = async (login) => {
              try {
                const r = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  username: login,
                });
                return ["admin", "maintain", "write"].includes(r.data.permission);
              } catch {
                return false;
              }
            };

            const refForPr = async (prNumber) => {
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              return pr.data.head.sha;
            };

            if (event === "workflow_dispatch") {
              core.setOutput("should_run", "true");
              core.setOutput("ref", context.sha);
              return;
            }

            if (event === "pull_request") {
              if (context.payload.label?.name !== "run-tier2") {
                core.setOutput("should_run", "false");
                return;
              }
              if (!(await hasWritePerm(actor))) {
                core.setFailed(`@${actor} added the run-tier2 label but lacks write permission`);
                return;
              }
              core.setOutput("should_run", "true");
              core.setOutput("ref", context.payload.pull_request.head.sha);
              core.setOutput("pr_number", String(context.payload.pull_request.number));
              return;
            }

            if (event === "issue_comment") {
              if (!context.payload.issue.pull_request) {
                core.setOutput("should_run", "false");
                return;
              }
              const body = (context.payload.comment.body || "").trim();
              if (!/^\/eval\s+tier2\b/i.test(body)) {
                core.setOutput("should_run", "false");
                return;
              }
              if (!(await hasWritePerm(actor))) {
                core.setFailed(`@${actor} ran /eval tier2 but lacks write permission`);
                return;
              }
              const ref = await refForPr(context.payload.issue.number);
              core.setOutput("should_run", "true");
              core.setOutput("ref", ref);
              core.setOutput("pr_number", String(context.payload.issue.number));

              // Acknowledge so the human knows it kicked off.
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: "rocket",
              });
              return;
            }

            core.setOutput("should_run", "false");

  pipeline:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: evals
    env:
      LANGWATCH_API_KEY: ${{ secrets.LANGWATCH_API_KEY }}
      LANGWATCH_PROJECT_ID: ${{ secrets.LANGWATCH_PROJECT_ID }}
      LANGWATCH_ENDPOINT: ${{ secrets.LANGWATCH_ENDPOINT }}
      LANGWATCH_VIRTUAL_AI_KEY: ${{ secrets.LANGWATCH_VIRTUAL_AI_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.guard.outputs.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile

      # Tier-2 invokes one `/review-*` skill per cell via `claude -p`. The
      # Claude Code CLI ships as @anthropic-ai/claude-code on npm; install
      # pinned so CI matches local. The AI gateway env vars route every call
      # through LangWatch — `claude -p` honours ANTHROPIC_BASE_URL +
      # ANTHROPIC_AUTH_TOKEN.
      - name: Install Claude Code CLI
        # Pinned so a malicious postinstall in a hot-published version can't
        # exfil the LANGWATCH_* secrets that are in scope at install time.
        # Bump deliberately when you want a newer CLI.
        run: npm install -g @anthropic-ai/claude-code@2.1.142
      - name: Configure gateway env for claude
        run: |
          echo "ANTHROPIC_BASE_URL=$LANGWATCH_ENDPOINT" >> "$GITHUB_ENV"
          echo "ANTHROPIC_AUTH_TOKEN=$LANGWATCH_VIRTUAL_AI_KEY" >> "$GITHUB_ENV"

      - name: Install the skill plugin under test
        run: |
          # The plugin under test is the repo itself. Install the marketplace
          # entry so /review-* slash commands resolve under `claude -p`.
          claude --version
          claude plugin marketplace add "$GITHUB_WORKSPACE" || true
          claude plugin install skills@0xdeafcafe-skills || true

      - name: Run tier-2 pipeline
        env:
          TIER2_FIXTURE: ${{ github.event.inputs.fixture }}
          TIER2_REVIEWER: ${{ github.event.inputs.reviewer }}
          TIER2_RUNS: ${{ github.event.inputs.runs }}
          # Workflow always asks for a summary; the comment step below only
          # uses it when there's a PR to post to (workflow_dispatch has none).
          TIER2_SUMMARY: ${{ github.workspace }}/tier2-summary.md
        run: |
          ARGS=(--summary-path "$TIER2_SUMMARY")
          if [ -n "$TIER2_FIXTURE" ]; then ARGS+=(--fixture "$TIER2_FIXTURE"); fi
          if [ -n "$TIER2_REVIEWER" ]; then ARGS+=(--reviewer "$TIER2_REVIEWER"); fi
          if [ -n "$TIER2_RUNS" ]; then ARGS+=(--runs "$TIER2_RUNS"); fi
          pnpm tier2 "${ARGS[@]}"

          # Surface cost / pass-rate to whoever triggered the run without
          # making them dig through stdout. Step Summary renders on the
          # workflow run's main view.
          if [ -f "$TIER2_SUMMARY" ]; then
            cat "$TIER2_SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          fi

      # Render results inline on the PR if this was a PR-triggered run.
      # Re-runs edit the same comment (marker tag) so the timeline doesn't
      # fill with eval rollups. Failures here don't fail the job — the
      # eval result is in the workflow log + LangWatch regardless.
      - name: Post / update PR comment with results
        if: always() && needs.guard.outputs.pr_number != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.guard.outputs.pr_number }}
          SUMMARY_FILE: ${{ github.workspace }}/tier2-summary.md
          REPO: ${{ github.repository }}
        working-directory: ${{ github.workspace }}
        run: |
          if [ ! -s "$SUMMARY_FILE" ]; then
            echo "no summary file — nothing to post"
            exit 0
          fi
          MARKER='<!-- evals-tier2-result -->'
          EXISTING_ID=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --paginate \
            --jq "[.[] | select(.body | startswith(\"$MARKER\"))] | first | .id // empty")
          if [ -n "$EXISTING_ID" ]; then
            echo "editing existing comment $EXISTING_ID"
            gh api -X PATCH "repos/$REPO/issues/comments/$EXISTING_ID" \
              -F body=@"$SUMMARY_FILE"
          else
            echo "creating new comment"
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file "$SUMMARY_FILE"
          fi
