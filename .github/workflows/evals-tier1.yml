# Tier-1 — contract tests. No LLM calls, no LangWatch dependency.
# Runs on every PR + push so reviewer-prompt drift / schema regressions
# show up immediately.
name: evals · tier-1

on:
  pull_request:
    paths:
      - "evals/**"
      - "agents/**"
      - "references/**"
      - "skills/**"
      - ".github/workflows/evals-tier1.yml"
  push:
    branches: [main]
    paths:
      - "evals/**"
      - "agents/**"
      - "references/**"
      - "skills/**"
      - ".github/workflows/evals-tier1.yml"

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: evals
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm tier1
